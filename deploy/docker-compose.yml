# DeepSeek Native Agent - Docker Compose validation base
#
# Purpose:
#   Minimal reproducible deployment base for local/cloud smoke tests.
#   This is intentionally conservative: API server only by default, no Telegram.
#
# Usage:
#   cd deploy
#   cp .env.example .env
#   # edit .env: set DEEPSEEK_API_KEY and API_SERVER_KEY
#   docker compose up -d
#   docker compose logs -f deepseek-native-agent
#
# Security:
#   - API server binds to 127.0.0.1 by default.
#   - Do not expose 8642 publicly without reverse-proxy auth/TLS.
#   - Secrets belong in deploy/.env or a real secrets manager, not in this file.

services:
  deepseek-native-agent:
    image: ${DEEPSEEK_NATIVE_IMAGE:-deepseek-native-agent:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HERMES_BASE_IMAGE: ${HERMES_BASE_IMAGE:-nousresearch/hermes-agent:latest}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
    container_name: ${DEEPSEEK_NATIVE_CONTAINER:-deepseek-native-agent}
    restart: unless-stopped
    command: ["gateway", "run"]
    ports:
      - "${API_SERVER_BIND:-127.0.0.1}:${API_SERVER_PORT:-8642}:8642"
    volumes:
      - ${DEEPSEEK_NATIVE_DATA_DIR:-./data}:/opt/data
    environment:
      # Core provider defaults for the DeepSeek-native profile.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-${HERMES_PROVIDER:-deepseek}}
      HERMES_MODEL: ${HERMES_MODEL:-deepseek-v4-flash}

      # API server is the compose smoke-test surface and future Web UI bridge.
      API_SERVER_ENABLED: ${API_SERVER_ENABLED:-true}
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${API_SERVER_KEY:?API_SERVER_KEY is required and should be random}
      API_SERVER_CORS_ORIGINS: ${API_SERVER_CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      GATEWAY_ALLOW_ALL_USERS: ${GATEWAY_ALLOW_ALL_USERS:-false}

      # Disable noisy chat platforms by default. Feishu guide will opt in later.
      TELEGRAM_ENABLED: "false"
      WEIXIN_ENABLED: "false"
      FEISHU_ENABLED: ${FEISHU_ENABLED:-false}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_DOMAIN: ${FEISHU_DOMAIN:-feishu}
      FEISHU_CONNECTION_MODE: ${FEISHU_CONNECTION_MODE:-websocket}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      FEISHU_ALLOWED_USERS: ${FEISHU_ALLOWED_USERS:-}
      FEISHU_HOME_CHANNEL: ${FEISHU_HOME_CHANNEL:-}
      FEISHU_HOME_CHANNEL_NAME: ${FEISHU_HOME_CHANNEL_NAME:-Home}
      FEISHU_HOME_CHANNEL_THREAD_ID: ${FEISHU_HOME_CHANNEL_THREAD_ID:-}

      # DeepSeek-native routing/telemetry defaults. These env names are documented
      # for the wrapper profile; the underlying Hermes config may still need to be
      # materialized into /opt/data/config.yaml by install scripts.
      DEEPSEEK_NATIVE_ROUTING_ENABLED: ${DEEPSEEK_NATIVE_ROUTING_ENABLED:-true}
      DEEPSEEK_NATIVE_FLASH_MODEL: ${DEEPSEEK_NATIVE_FLASH_MODEL:-deepseek-v4-flash}
      DEEPSEEK_NATIVE_PRO_MODEL: ${DEEPSEEK_NATIVE_PRO_MODEL:-deepseek-v4-pro}
      DEEPSEEK_NATIVE_TELEMETRY_ENABLED: ${DEEPSEEK_NATIVE_TELEMETRY_ENABLED:-true}

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 - <<'PY'\nimport os, urllib.request\nurl='http://127.0.0.1:8642/health'\ntry:\n    with urllib.request.urlopen(url, timeout=5) as r:\n        raise SystemExit(0 if r.status < 500 else 1)\nexcept Exception:\n    raise SystemExit(1)\nPY"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
